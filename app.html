<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCM Document Agent · v5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1F3A5F;
  --navy-700: #18304E;
  --navy-50: #EEF2F8;
  --steel: #3A6EA5;
  --steel-50: #E8F0F9;
  --green: #2DBE60;
  --green-50: #E6F8EC;
  --amber: #F5A623;
  --red: #E5484D;
  --white: #FFFFFF;
  --gray-900: #1B1F26;
  --gray-700: #2B2B2B;
  --gray-500: #6B7280;
  --gray-400: #9AA3AF;
  --gray-300: #D6DBE3;
  --gray-200: #E5E9EF;
  --gray-100: #EEF1F5;
  --bg: #F4F6F9;
  --shadow-sm: 0 1px 2px rgba(31,58,95,0.06);
  --shadow-md: 0 4px 12px rgba(31,58,95,0.08);
  --shadow-lg: 0 12px 32px rgba(31,58,95,0.12);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  font-family: 'Sarabun', 'Tahoma', 'MS Sans Serif', 'Arial Unicode MS', sans-serif;
  background: var(--bg);
  color: var(--gray-700);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

h1, h2, h3, h4, h5, .h {
  font-family: 'Prompt', 'Tahoma', 'MS Sans Serif', 'Arial Unicode MS', sans-serif;
  font-weight: 600;
  color: var(--navy);
  letter-spacing: -0.01em;
  margin: 0;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea { font-family: inherit; }

.app { min-height: 100vh; display: flex; flex-direction: column; }

.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,0.92);
  backdrop-filter: saturate(180%) blur(12px);
  border-bottom: 1px solid var(--gray-200);
}
.topbar-inner {
  max-width: 1280px; margin: 0 auto;
  padding: 14px 28px;
  display: flex; align-items: center; gap: 16px;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-mark {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--steel) 100%);
  display: grid; place-items: center;
  color: white; font-family: 'Prompt'; font-weight: 700; font-size: 16px;
  box-shadow: var(--shadow-sm);
}
.brand-text { display: flex; flex-direction: column; line-height: 1.1; }
.brand-text .name { font-family: 'Prompt'; font-weight: 600; color: var(--navy); font-size: 15px; }
.brand-text .sub { font-size: 11px; color: var(--gray-500); letter-spacing: 0.04em; text-transform: uppercase; }

.nav { display: flex; gap: 4px; margin-left: auto; flex-shrink: 0; }
.nav button {
  padding: 8px 14px; border-radius: 8px;
  color: var(--gray-500); font-size: 14px; font-weight: 500;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.15s;
  white-space: nowrap;
}
.nav button:hover { background: var(--gray-100); color: var(--navy); }
.nav button.active { background: var(--navy-50); color: var(--navy); font-weight: 600; }

.user-pill {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 12px 6px 6px;
  border: 1px solid var(--gray-200);
  border-radius: 999px;
  background: white;
}
.user-pill .avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--steel), var(--navy));
  color: white; font-size: 12px; font-weight: 600;
  display: grid; place-items: center;
  font-family: 'Prompt';
}
.user-pill .uname { font-size: 13px; font-weight: 500; color: var(--navy); white-space: nowrap; }

.container { max-width: 1280px; margin: 0 auto; padding: 0 28px; width: 100%; }

.hero {
  position: relative; overflow: hidden;
  background: linear-gradient(135deg, var(--navy) 0%, #213F66 50%, var(--steel) 100%);
  color: white;
  padding: 56px 0 72px;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 15% 30%, rgba(45,190,96,0.18), transparent 40%),
    radial-gradient(circle at 85% 70%, rgba(58,110,165,0.4), transparent 50%);
  pointer-events: none;
}
.hero::after {
  content: ''; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: linear-gradient(to bottom, black, transparent 80%);
  pointer-events: none;
}
.hero-inner {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 48px; align-items: center;
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  background: rgba(45,190,96,0.18);
  border: 1px solid rgba(45,190,96,0.35);
  border-radius: 999px;
  font-size: 12px; font-weight: 500; color: #A8EFC0;
  letter-spacing: 0.04em;
  width: fit-content;
  white-space: nowrap;
}
.hero-eyebrow .dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--green);
  box-shadow: 0 0 0 3px rgba(45,190,96,0.3);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 3px rgba(45,190,96,0.3); }
  50% { box-shadow: 0 0 0 6px rgba(45,190,96,0.1); }
}
.hero h1 {
  color: white;
  font-size: 44px; line-height: 1.15; font-weight: 600;
  margin: 18px 0 16px;
  letter-spacing: -0.02em;
}
.hero h1 .hl { color: #6CE89B; }
.hero p.lead {
  font-size: 17px; color: rgba(255,255,255,0.78);
  max-width: 540px; margin: 0 0 28px;
}
.hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
.hero-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  margin-top: 36px; padding-top: 28px;
  border-top: 1px solid rgba(255,255,255,0.12);
}
.hero-stats .stat .n {
  font-family: 'Prompt'; font-size: 28px; font-weight: 600; color: white;
  display: flex; align-items: baseline; gap: 4px;
}
.hero-stats .stat .n small { font-size: 14px; color: rgba(255,255,255,0.55); font-weight: 400; }
.hero-stats .stat .l { font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: 0.04em; text-transform: uppercase; margin-top: 2px; }

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 11px 18px; border-radius: 10px;
  font-size: 14px; font-weight: 500;
  transition: all 0.15s;
  font-family: 'Sarabun';
  white-space: nowrap;
}
.btn-primary { background: var(--green); color: white; box-shadow: 0 6px 16px rgba(45,190,96,0.35); }
.btn-primary:hover { background: #25A551; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(45,190,96,0.45); }
.btn-secondary { background: rgba(255,255,255,0.12); color: white; border: 1px solid rgba(255,255,255,0.22); }
.btn-secondary:hover { background: rgba(255,255,255,0.2); }
.btn-ghost { color: var(--navy); background: white; border: 1px solid var(--gray-200); }
.btn-ghost:hover { border-color: var(--steel); background: var(--steel-50); }
.btn-navy { background: var(--navy); color: white; }
.btn-navy:hover { background: var(--navy-700); }
.btn-sm { padding: 7px 12px; font-size: 13px; border-radius: 8px; }
.btn-icon { padding: 8px; }

.hero-preview {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 14px;
  backdrop-filter: blur(8px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.hero-preview-head {
  display: flex; align-items: center; gap: 8px;
  padding: 0 4px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.hero-preview-head .lights { display: flex; gap: 5px; }
.hero-preview-head .lights span { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.18); }
.hero-preview-head .label { font-size: 12px; color: rgba(255,255,255,0.5); margin-left: 8px; font-family: 'Prompt'; }
.hero-preview-body { padding: 14px 6px 6px; display: flex; flex-direction: column; gap: 10px; }
.hp-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
}
.hp-row.featured { background: rgba(45,190,96,0.1); border-color: rgba(45,190,96,0.25); }
.hp-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: grid; place-items: center;
  font-size: 12px; font-weight: 600; font-family: 'Prompt';
  flex-shrink: 0;
}
.hp-meta { flex: 1; min-width: 0; }
.hp-meta .t { font-size: 13px; color: white; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hp-meta .s { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; }
.hp-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 999px;
  font-weight: 600; letter-spacing: 0.04em;
}
.hp-badge.latest { background: var(--green); color: white; }
.hp-badge.old { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.55); }

.section { padding: 56px 0; }
.section-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 24px; gap: 16px;
}
.section-title h2 { font-size: 24px; font-weight: 600; }
.section-title .sub { color: var(--gray-500); font-size: 14px; margin-top: 4px; }

.card {
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}

.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.stat-card {
  padding: 20px 22px;
  background: white;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  position: relative; overflow: hidden;
  transition: all 0.2s;
}
.stat-card:hover { border-color: var(--steel); transform: translateY(-2px); box-shadow: var(--shadow-md); }
.stat-card .lbl {
  font-size: 12px; color: var(--gray-500); font-weight: 500;
  letter-spacing: 0.04em; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.stat-card .lbl .ico {
  width: 28px; height: 28px; border-radius: 8px;
  display: grid; place-items: center;
}
.stat-card .v {
  font-family: 'Prompt'; font-size: 32px; font-weight: 600;
  color: var(--navy); margin-top: 10px;
  display: flex; align-items: baseline; gap: 6px;
}
.stat-card .v small { font-size: 14px; color: var(--gray-500); font-weight: 400; }
.stat-card .trend {
  margin-top: 10px;
  font-size: 12px; color: var(--green);
  display: flex; align-items: center; gap: 4px;
}
.stat-card .trend.flat { color: var(--gray-500); }

.dash-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; }
.dash-grid .pane h3 {
  font-size: 16px; font-weight: 600; margin-bottom: 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.dash-grid .pane h3 a { font-size: 13px; color: var(--steel); font-weight: 500; cursor: pointer; }

.proj-list { display: flex; flex-direction: column; gap: 12px; }
.proj-card {
  display: grid; grid-template-columns: 56px 1fr auto; gap: 16px;
  padding: 16px; background: white; border: 1px solid var(--gray-200);
  border-radius: var(--radius-md); align-items: center;
  cursor: pointer; transition: all 0.15s;
}
.proj-card:hover { border-color: var(--steel); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.proj-thumb {
  width: 56px; height: 56px; border-radius: 12px;
  display: grid; place-items: center;
  color: white; font-family: 'Prompt'; font-weight: 600; font-size: 18px;
  position: relative; overflow: hidden;
}
.proj-thumb::after {
  content: ''; position: absolute; inset: 0;
  background-image:
    linear-gradient(45deg, rgba(255,255,255,0.08) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.08) 75%, transparent 75%);
  background-size: 8px 8px;
}
.proj-meta .name {
  font-family: 'Prompt'; font-weight: 500; color: var(--navy);
  font-size: 15px;
}
.proj-meta .info {
  display: flex; gap: 12px; margin-top: 4px;
  font-size: 12px; color: var(--gray-500);
}
.proj-meta .info span { display: flex; align-items: center; gap: 4px; }
.proj-actions { display: flex; gap: 6px; align-items: center; }

.file-list { display: flex; flex-direction: column; gap: 8px; }
.file-row {
  display: grid; grid-template-columns: 36px 1fr auto auto; gap: 12px;
  align-items: center;
  padding: 12px 14px;
  background: white; border: 1px solid var(--gray-200);
  border-radius: 10px; transition: all 0.15s;
}
.file-row:hover { border-color: var(--steel); background: var(--steel-50); }
.file-ico {
  width: 36px; height: 36px; border-radius: 8px;
  display: grid; place-items: center;
  font-size: 11px; font-family: 'Prompt'; font-weight: 600; color: white;
}
.file-meta { min-width: 0; }
.file-meta .fn {
  font-size: 13px; color: var(--gray-900); font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.file-meta .info {
  font-size: 11px; color: var(--gray-500); margin-top: 2px;
  display: flex; gap: 10px;
}
.badge {
  font-size: 10px; padding: 3px 8px; border-radius: 999px;
  font-weight: 600; letter-spacing: 0.04em;
}
.badge-latest { background: var(--green-50); color: #1F8E48; border: 1px solid rgba(45,190,96,0.3); }
.badge-old { background: var(--gray-100); color: var(--gray-500); }
.badge-new { background: var(--steel-50); color: var(--steel); }
.icon-btn {
  width: 30px; height: 30px; border-radius: 8px;
  display: grid; place-items: center;
  color: var(--gray-500); transition: all 0.15s;
}
.icon-btn:hover { background: var(--steel-50); color: var(--steel); }
.icon-btn.danger:hover { background: #FDECEC; color: var(--red); }

.dt-eia { background: #2DBE60; }
.dt-แบบ, .dt-drawing { background: #3A6EA5; }
.dt-สัญญา, .dt-contract { background: #6E56CF; }
.dt-แรงงาน, .dt-labor { background: #F5A623; }
.dt-มาตรฐาน, .dt-standard { background: #0EA5E9; }
.dt-mom { background: #EC4899; }
.dt-ราคา, .dt-boq { background: #DC2626; }
.dt-อื่นๆ, .dt-other { background: #6B7280; }
.dt-bg-eia { background: rgba(45,190,96,0.12); color: #1F8E48; }
.dt-bg-แบบ, .dt-bg-drawing { background: rgba(58,110,165,0.12); color: var(--steel); }
.dt-bg-สัญญา, .dt-bg-contract { background: rgba(110,86,207,0.12); color: #6E56CF; }
.dt-bg-แรงงาน, .dt-bg-labor { background: rgba(245,166,35,0.14); color: #C77F00; }
.dt-bg-มาตรฐาน, .dt-bg-standard { background: rgba(14,165,233,0.12); color: #0284C7; }
.dt-bg-mom { background: rgba(236,72,153,0.12); color: #DB2777; }
.dt-bg-ราคา, .dt-bg-boq { background: rgba(220,38,38,0.12); color: #B91C1C; }

.dtype-bar { display: flex; flex-direction: column; gap: 12px; }
.dtype-row { display: flex; align-items: center; gap: 12px; }
.dtype-row .lab { width: 90px; font-size: 13px; color: var(--gray-700); font-weight: 500; }
.dtype-row .bar { flex: 1; height: 8px; background: var(--gray-100); border-radius: 999px; overflow: hidden; }
.dtype-row .bar .fill { height: 100%; border-radius: 999px; transition: width 0.6s ease; }
.dtype-row .n { width: 32px; text-align: right; font-family: 'Prompt'; font-weight: 600; color: var(--navy); font-size: 14px; }

.timeline { display: flex; flex-direction: column; gap: 12px; }
.tl-item { display: flex; gap: 12px; }
.tl-dot {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  display: grid; place-items: center;
  background: var(--steel-50); color: var(--steel);
}
.tl-body { font-size: 13px; color: var(--gray-700); line-height: 1.5; }
.tl-body .t { font-weight: 500; color: var(--navy); }
.tl-body .when { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

.footer {
  margin-top: 56px; padding: 28px 0;
  border-top: 1px solid var(--gray-200); background: white;
  text-align: center; color: var(--gray-500); font-size: 13px;
}

.modal-backdrop {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(15,23,42,0.55);
  backdrop-filter: blur(4px);
  display: grid; place-items: center;
  animation: fadeIn 0.18s ease;
  padding: 20px;
}
@keyframes fadeIn { from { opacity: 0; } }
.modal {
  background: white; border-radius: 18px;
  width: min(560px, 100%);
  max-height: 90vh; overflow: auto;
  box-shadow: 0 24px 60px rgba(0,0,0,0.3);
  animation: slideUp 0.22s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } }
.modal-head {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--gray-100);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-head h3 { font-size: 18px; font-weight: 600; }
.modal-body { padding: 22px 24px; }
.modal-foot {
  padding: 14px 24px; border-top: 1px solid var(--gray-100);
  display: flex; gap: 10px; justify-content: flex-end;
}

.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field label { font-size: 13px; font-weight: 500; color: var(--navy); }
.field input, .field select, .field textarea {
  padding: 10px 12px; font-size: 14px;
  border: 1px solid var(--gray-200); border-radius: 8px;
  background: white; color: var(--gray-900);
  transition: all 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--steel);
  box-shadow: 0 0 0 3px var(--steel-50);
}

.dropzone {
  border: 2px dashed var(--gray-300); border-radius: 14px;
  padding: 32px 20px; text-align: center;
  background: var(--bg);
  transition: all 0.2s;
  cursor: pointer;
}
.dropzone.drag { border-color: var(--green); background: var(--green-50); }
.dropzone .ic { font-size: 36px; color: var(--steel); margin-bottom: 10px; }
.dropzone .t { font-family: 'Prompt'; font-weight: 500; color: var(--navy); }
.dropzone .s { font-size: 12px; color: var(--gray-500); margin-top: 4px; }
.upload-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; max-height: 200px; overflow: auto; }
.upload-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; background: var(--bg); border-radius: 8px;
  font-size: 13px;
}
.upload-item .bar { flex: 1; height: 4px; background: var(--gray-200); border-radius: 999px; overflow: hidden; }
.upload-item .bar .fill { height: 100%; background: var(--green); transition: width 0.4s; }

.chat-fab {
  position: fixed; right: 24px; bottom: 24px; z-index: 60;
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--navy), var(--steel));
  color: white;
  display: grid; place-items: center;
  box-shadow: 0 12px 28px rgba(31,58,95,0.4);
  transition: transform 0.15s;
}
.chat-fab:hover { transform: scale(1.05); }
.chat-fab::after {
  content: ''; position: absolute; top: 4px; right: 4px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--green); border: 2px solid white;
}
.chat-panel {
  position: fixed; right: 24px; bottom: 24px; z-index: 70;
  width: 400px; max-width: calc(100vw - 32px);
  height: 600px; max-height: calc(100vh - 48px);
  background: white; border-radius: 18px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.22);
  display: flex; flex-direction: column;
  overflow: hidden;
  animation: chatIn 0.22s ease;
}
@keyframes chatIn { from { transform: translateY(20px) scale(0.96); opacity: 0; } }
.chat-head {
  padding: 14px 16px;
  background: linear-gradient(135deg, var(--navy), var(--steel));
  color: white;
  display: flex; align-items: center; gap: 12px;
}
.chat-head .ico {
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(255,255,255,0.18);
  display: grid; place-items: center;
}
.chat-head .ttl { font-family: 'Prompt'; font-weight: 600; }
.chat-head .sub { font-size: 11px; color: rgba(255,255,255,0.7); }
.chat-head .close { margin-left: auto; color: white; padding: 6px; border-radius: 8px; }
.chat-head .close:hover { background: rgba(255,255,255,0.15); }
.chat-msgs {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
  background: var(--bg);
}
.msg { max-width: 85%; }
.msg.user { align-self: flex-end; }
.msg.bot { align-self: flex-start; }
.msg .bubble {
  padding: 10px 14px; border-radius: 14px;
  font-size: 14px; line-height: 1.5;
}
.msg.user .bubble {
  background: var(--navy); color: white;
  border-bottom-right-radius: 4px;
}
.msg.bot .bubble {
  background: white; color: var(--gray-900);
  border: 1px solid var(--gray-200);
  border-bottom-left-radius: 4px;
}
.msg .meta { font-size: 10px; color: var(--gray-400); margin-top: 4px; padding: 0 4px; }
.msg.user .meta { text-align: right; }
.msg .file-pill {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; margin-top: 8px;
  background: var(--green-50); border: 1px solid rgba(45,190,96,0.3);
  border-radius: 10px;
  cursor: pointer; transition: all 0.15s;
}
.msg .file-pill:hover { background: rgba(45,190,96,0.18); }
.msg .file-pill .nm { font-size: 12px; color: var(--navy); font-weight: 500; }
.typing { display: inline-flex; gap: 3px; padding: 4px 0; }
.typing span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gray-400);
  animation: bounce 1.4s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-4px); opacity: 1; }
}
.chat-input {
  padding: 12px; border-top: 1px solid var(--gray-200);
  display: flex; gap: 8px; background: white;
}
.chat-input input {
  flex: 1; padding: 10px 14px; border: 1px solid var(--gray-200); border-radius: 999px;
  font-size: 14px; outline: none;
}
.chat-input input:focus { border-color: var(--steel); box-shadow: 0 0 0 3px var(--steel-50); }
.chat-input button {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--navy); color: white;
  display: grid; place-items: center;
  transition: all 0.15s;
}
.chat-input button:hover:not(:disabled) { background: var(--steel); }
.chat-input button:disabled { opacity: 0.4; cursor: not-allowed; }
.chat-suggest { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.chat-suggest button {
  font-size: 12px; padding: 6px 10px;
  background: white; border: 1px solid var(--gray-200);
  border-radius: 999px; color: var(--navy);
  transition: all 0.15s;
}
.chat-suggest button:hover { background: var(--steel-50); border-color: var(--steel); }

.drawer-bd {
  position: fixed; inset: 0; z-index: 90;
  background: rgba(15,23,42,0.45); backdrop-filter: blur(3px);
  animation: fadeIn 0.18s ease;
}
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: 95;
  width: min(680px, 100%);
  background: var(--bg); box-shadow: -20px 0 60px rgba(0,0,0,0.2);
  display: flex; flex-direction: column;
  animation: slideInR 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes slideInR { from { transform: translateX(100%); } }
.drawer-head {
  padding: 20px 24px;
  background: linear-gradient(135deg, var(--navy), var(--steel));
  color: white;
}
.drawer-head .top { display: flex; align-items: center; justify-content: space-between; }
.drawer-head h2 { color: white; font-size: 22px; margin-top: 8px; }
.drawer-head .info { display: flex; gap: 16px; margin-top: 10px; font-size: 13px; color: rgba(255,255,255,0.78); }
.drawer-head .info span { display: flex; align-items: center; gap: 4px; }
.drawer-head .close { color: white; padding: 8px; border-radius: 10px; }
.drawer-head .close:hover { background: rgba(255,255,255,0.15); }
.drawer-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
.drawer-tools {
  display: flex; gap: 10px; align-items: center;
  padding: 14px 24px; background: white; border-bottom: 1px solid var(--gray-200);
}
.drawer-search {
  flex: 1; display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; background: var(--bg);
  border: 1px solid var(--gray-200); border-radius: 8px;
}
.drawer-search input { flex: 1; border: none; outline: none; background: transparent; font-size: 13px; }
.filter-chip {
  padding: 6px 12px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--gray-200); background: white;
  color: var(--gray-700); border-radius: 999px;
  cursor: pointer; transition: all 0.15s;
}
.filter-chip:hover { border-color: var(--steel); color: var(--steel); }
.filter-chip.on { background: var(--navy); color: white; border-color: var(--navy); }

.version-group {
  background: white; border: 1px solid var(--gray-200);
  border-radius: 12px; overflow: hidden; margin-bottom: 12px;
}
.vg-head {
  padding: 12px 16px;
  background: var(--gray-100);
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13px; color: var(--navy); font-weight: 500;
}
.vg-body { padding: 8px; display: flex; flex-direction: column; gap: 6px; }

.toast-wrap { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--navy); color: white;
  padding: 12px 18px; border-radius: 10px;
  font-size: 14px; font-weight: 500;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.25);
  animation: toastIn 0.2s ease;
}
.toast.ok { background: var(--green); }
.toast.err { background: var(--red); }
@keyframes toastIn { from { transform: translateY(20px); opacity: 0; } }

@media (max-width: 980px) {
  .hero-inner { grid-template-columns: 1fr; gap: 32px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .dash-grid { grid-template-columns: 1fr; }
  .hero h1 { font-size: 34px; }
  .topbar-inner { padding: 12px 20px; gap: 12px; }
  .nav { display: none; }
  .container { padding: 0 20px; }
}
@media (max-width: 560px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .section { padding: 36px 0; }
  .hero { padding: 36px 0 48px; }
  .hero h1 { font-size: 28px; }
  .hero p.lead { font-size: 15px; }
  .user-pill .uname { display: none; }
  .proj-card { grid-template-columns: 48px 1fr; }
  .proj-card .proj-actions { grid-column: 1 / -1; justify-content: flex-end; }
  .chat-panel { right: 12px; left: 12px; bottom: 12px; width: auto; height: calc(100vh - 80px); }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

<script type="text/babel">
// Data + all components inline
window.TCM_DATA = (() => {
  const now = new Date();
  const daysAgo = (d) => {
    const dt = new Date(now); dt.setDate(dt.getDate() - d);
    return dt.toISOString().slice(0,10);
  };

  const projects = [
    { id: 'p1', name: 'รถไฟฟ้าสายสีม่วงใต้ ช่วงเตาปูน–ราษฎร์บูรณะ', code: 'MRT-PP', client: 'การรถไฟฟ้าขนส่งมวลชนแห่งประเทศไทย', color: '#1F3A5F', status: 'กำลังดำเนินการ' },
    { id: 'p2', name: 'อาคารสำนักงานใหญ่ ABC ทาวเวอร์', code: 'ABC-HQ', client: 'บริษัท เอบีซี โฮลดิ้ง จำกัด (มหาชน)', color: '#3A6EA5', status: 'กำลังดำเนินการ' },
    { id: 'p3', name: 'ทางหลวงพิเศษหมายเลข 7 ส่วนต่อขยาย', code: 'M7-EXT', client: 'กรมทางหลวง', color: '#2DBE60', status: 'อนุมัติแบบ' },
    { id: 'p4', name: 'อ่างเก็บน้ำห้วยโสมง อันเนื่องมาจากพระราชดำริ', code: 'HSM-RES', client: 'กรมชลประทาน', color: '#6E56CF', status: 'ปิดโครงการ' },
  ];

  const T = { EIA: 'EIA', DRAW: 'แบบ', CONT: 'สัญญา', LABOR: 'แรงงาน', STD: 'มาตรฐาน', MOM: 'MOM', BOQ: 'ราคา', OTHER: 'อื่นๆ' };
  const ext = { pdf: 'pdf', doc: 'docx', xls: 'xlsx', img: 'jpg' };
  const mk = (id, proj, type, baseName, rev, dateOffset, ext, sizeKB) => ({
    id, projectId: proj, type, baseName,
    name: rev ? `${baseName}_${rev}.${ext}` : `${baseName}.${ext}`,
    rev, date: daysAgo(dateOffset), ext, size: sizeKB, uploader: 'ทีมเอกสาร',
  });

  const files = [
    mk('f01','p1', T.EIA, 'EIA_MRT-PP-เตาปูน', 'Rev3', 2, 'pdf', 8420),
    mk('f02','p1', T.EIA, 'EIA_MRT-PP-เตาปูน', 'Rev2', 35, 'pdf', 8120),
    mk('f03','p1', T.EIA, 'EIA_MRT-PP-เตาปูน', 'Rev1', 92, 'pdf', 7980),
    mk('f04','p1', T.DRAW, 'แบบโครงสร้าง_สถานี-ดาวคะนอง', 'Rev2', 5, 'pdf', 24580),
    mk('f05','p1', T.DRAW, 'แบบโครงสร้าง_สถานี-ดาวคะนอง', 'Rev1', 28, 'pdf', 23110),
    mk('f06','p1', T.BOQ, 'BOQ_MRT-PP_เซ็คชั่น-A', 'v3', 1, 'xlsx', 1240),
    mk('f07','p1', T.BOQ, 'BOQ_MRT-PP_เซ็คชั่น-A', 'v2', 18, 'xlsx', 1180),
    mk('f08','p1', T.MOM, 'MOM_ประชุมสัปดาห์ที่-18', null, 3, 'pdf', 420),
    mk('f09','p1', T.MOM, 'MOM_ประชุมสัปดาห์ที่-17', null, 10, 'pdf', 410),
    mk('f10','p1', T.CONT, 'สัญญาก่อสร้างหลัก_MRT-PP', 'Rev2', 60, 'pdf', 5320),
    mk('f11','p1', T.LABOR, 'รายงานความปลอดภัยแรงงาน_Q1-2026', null, 22, 'pdf', 980),
    mk('f20','p2', T.DRAW, 'แบบสถาปัตย์_ABC-Tower-Lobby', 'Rev4', 1, 'pdf', 18200),
    mk('f21','p2', T.DRAW, 'แบบสถาปัตย์_ABC-Tower-Lobby', 'Rev3', 14, 'pdf', 17800),
    mk('f22','p2', T.DRAW, 'แบบสถาปัตย์_ABC-Tower-Lobby', 'Rev2', 40, 'pdf', 17200),
    mk('f23','p2', T.BOQ, 'BOQ_ABC-Tower-โครงสร้าง', 'v2', 4, 'xlsx', 2160),
    mk('f24','p2', T.STD, 'มยผ-1101-เสาคอนกรีต', null, 30, 'pdf', 1820),
    mk('f25','p2', T.MOM, 'MOM_ประชุมเจ้าของโครงการ', null, 6, 'pdf', 380),
    mk('f26','p2', T.EIA, 'EIA_ABC-Tower-สิ่งแวดล้อม', 'Rev1', 55, 'pdf', 6210),
    mk('f30','p3', T.DRAW, 'แบบทางหลวง_M7-Section-3', 'Rev2', 7, 'pdf', 32400),
    mk('f31','p3', T.DRAW, 'แบบทางหลวง_M7-Section-3', 'Rev1', 48, 'pdf', 30200),
    mk('f32','p3', T.EIA, 'EIA_M7-ส่วนต่อขยาย', 'Rev2', 12, 'pdf', 9800),
    mk('f33','p3', T.BOQ, 'BOQ_M7-งานดิน', 'v1', 21, 'xlsx', 980),
    mk('f34','p3', T.STD, 'มาตรฐานทล-Spec-2020', null, 75, 'pdf', 3200),
    mk('f35','p3', T.MOM, 'MOM_ประชุมตรวจรับงานงวด-3', null, 9, 'pdf', 460),
    mk('f40','p4', T.DRAW, 'แบบเขื่อนหลัก_ห้วยโสมง', 'Rev5', 90, 'pdf', 28600),
    mk('f41','p4', T.CONT, 'สัญญาก่อสร้างเขื่อน_ห้วยโสมง', 'Rev1', 180, 'pdf', 4800),
    mk('f42','p4', T.BOQ, 'BOQ_ห้วยโสมง-งานเขื่อน', 'v3', 95, 'xlsx', 1640),
    mk('f43','p4', T.MOM, 'MOM_ประชุมส่งมอบ', null, 88, 'pdf', 320),
  ];

  const groups = {};
  files.forEach(f => {
    const k = `${f.projectId}|${f.type}|${f.baseName}`;
    if (!groups[k]) groups[k] = [];
    groups[k].push(f);
  });
  Object.values(groups).forEach(g => {
    g.sort((a,b) => new Date(b.date) - new Date(a.date));
    g.forEach((f, i) => { f.isLatest = i === 0; });
  });

  return { projects, files, types: T };
})();

// Claude fallback
if (!window.claude || typeof window.claude.complete !== 'function') {
  window.claude = window.claude || {};
  window.claude.complete = async function (prompt) {
    await new Promise(r => setTimeout(r, 450 + Math.random() * 350));
    const data = window.TCM_DATA;
    const q = (prompt.match(/ผู้ใช้ถาม:\s*"([^"]+)"/) || [, ''])[1].toLowerCase();
    const typeKeywords = {
      'EIA': /eia|สิ่งแวดล้อม/i, 'แบบ': /แบบ|drawing|blueprint|สถาปัตย์|โครงสร้าง/i, 'สัญญา': /สัญญา|contract/i,
      'แรงงาน': /แรงงาน|labor|safety|ปลอดภัย/i, 'มาตรฐาน': /มยผ|มาตรฐาน|standard|spec/i, 'MOM': /mom|ประชุม|minutes/i, 'ราคา': /ราคา|boq|ประมาณการ|budget/i,
    };
    let wantedType = null;
    for (const [t, re] of Object.entries(typeKeywords)) {
      if (re.test(q)) { wantedType = t; break; }
    }
    const proj = data.projects.find(p => q.includes(p.code.toLowerCase())) || data.projects.find(p => p.name.toLowerCase().split(/\s+/).some(w => w.length > 3 && q.includes(w.toLowerCase()))) || null;
    const wantsZip = /zip|รวม|แพ็?ค|ดาวน์โหลดทั้งโครงการ|ทั้งหมด/.test(q);
    const wantsCount = /กี่|มีกี่|จำนวน|how many|count/.test(q);
    const wantsLatest = /ล่าสุด|latest|ปัจจุบัน/.test(q);
    const fmt = (o) => JSON.stringify(o);
    if (wantsZip && proj) {
      return fmt({ intent: 'download_zip', reply: `รวมไฟล์ทั้งโครงการ ${proj.code} (${proj.name}) เป็น Zip ให้ครับ — มีทั้งหมด ${data.files.filter(f => f.projectId === proj.id).length} ไฟล์`, fileName: null, projectCode: proj.code });
    }
    if (wantsCount && wantedType) {
      const scope = proj ? data.files.filter(f => f.projectId === proj.id) : data.files;
      const n = scope.filter(f => f.type === wantedType).length;
      return fmt({ intent: 'answer', reply: proj ? `${proj.code} มีเอกสารประเภท ${wantedType} ทั้งหมด ${n} ฉบับครับ` : `ระบบมีเอกสารประเภท ${wantedType} ทั้งหมด ${n} ฉบับครับ`, fileName: null, projectCode: null });
    }
    if (wantedType || proj) {
      let candidates = data.files.slice();
      if (wantedType) candidates = candidates.filter(f => f.type === wantedType);
      if (proj) candidates = candidates.filter(f => f.projectId === proj.id);
      if (wantsLatest || candidates.length) { candidates = candidates.filter(f => f.isLatest); }
      candidates.sort((a, b) => new Date(b.date) - new Date(a.date));
      const hit = candidates[0];
      if (hit) {
        return fmt({ intent: 'download_single', reply: `พบเอกสาร${wantedType ? ' ' + wantedType : ''}${proj ? ' ของ ' + proj.code : ''} Version ล่าสุดแล้วครับ — ${hit.name}`, fileName: hit.name, projectCode: null });
      }
    }
    const totalProjects = data.projects.length;
    const totalFiles = data.files.length;
    return fmt({ intent: 'answer', reply: `ระบบมีโครงการทั้งหมด ${totalProjects} โครงการ และไฟล์ ${totalFiles} ฉบับครับ ลองระบุชื่อโครงการ (เช่น MRT-PP) หรือประเภทเอกสาร (EIA / แบบ / BOQ / MOM) ดูครับ`, fileName: null, projectCode: null });
  };
}

// Icon component
const Icon = ({ name, size = 18, stroke = 1.7, ...props }) => {
  const s = size;
  const sw = stroke;
  const common = { width: s, height: s, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: sw, strokeLinecap: 'round', strokeLinejoin: 'round', ...props };
  switch (name) {
    case 'upload': return <svg {...common}><path d="M12 16V4M5 11l7-7 7 7"/><path d="M4 20h16"/></svg>;
    case 'download': return <svg {...common}><path d="M12 4v12M5 13l7 7 7-7"/><path d="M4 4h16"/></svg>;
    case 'folder': return <svg {...common}><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"/></svg>;
    case 'file': return <svg {...common}><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-5Z"/><path d="M14 3v5h5"/></svg>;
    case 'sparkles': return <svg {...common}><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3Z"/><path d="M19 14l.7 2.3L22 17l-2.3.7L19 20l-.7-2.3L16 17l2.3-.7L19 14Z"/></svg>;
    case 'send': return <svg {...common}><path d="M22 2 11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7Z"/></svg>;
    case 'close': return <svg {...common}><path d="M18 6 6 18M6 6l12 12"/></svg>;
    case 'search': return <svg {...common}><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>;
    case 'chat': return <svg {...common}><path d="M21 11.5a8.4 8.4 0 0 1-12.5 7.3L3 21l2.2-5.5A8.4 8.4 0 1 1 21 11.5Z"/></svg>;
    case 'check': return <svg {...common}><path d="M20 6 9 17l-5-5"/></svg>;
    case 'trash': return <svg {...common}><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M6 6l1 14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-14"/></svg>;
    case 'zip': return <svg {...common}><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M12 5v14M9 8h2M9 11h2M9 14h2"/></svg>;
    case 'eye': return <svg {...common}><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12Z"/><circle cx="12" cy="12" r="3"/></svg>;
    case 'plus': return <svg {...common}><path d="M12 5v14M5 12h14"/></svg>;
    case 'clock': return <svg {...common}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>;
    case 'arrow-r': return <svg {...common}><path d="M5 12h14M13 5l7 7-7 7"/></svg>;
    case 'filter': return <svg {...common}><path d="M3 5h18l-7 9v5l-4-2v-3L3 5Z"/></svg>;
    case 'layers': return <svg {...common}><path d="m12 2 9 5-9 5-9-5 9-5Z"/><path d="m3 17 9 5 9-5M3 12l9 5 9-5"/></svg>;
    case 'building': return <svg {...common}><path d="M4 21V4a1 1 0 0 1 1-1h7a1 1 0 0 1 1 1v17"/><path d="M13 9h5a1 1 0 0 1 1 1v11"/><path d="M2 21h20M7 8h2M7 12h2M7 16h2M16 12h1M16 16h1"/></svg>;
    case 'bolt': return <svg {...common}><path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z"/></svg>;
    case 'menu': return <svg {...common}><path d="M3 6h18M3 12h18M3 18h18"/></svg>;
    case 'history': return <svg {...common}><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l3 2"/></svg>;
    case 'shield': return <svg {...common}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg>;
    case 'bell': return <svg {...common}><path d="M18 16v-5a6 6 0 1 0-12 0v5l-2 3h16l-2-3Z"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>;
    case 'trend-up': return <svg {...common}><path d="m23 6-9.5 9.5-5-5L1 18"/><path d="M17 6h6v6"/></svg>;
    default: return null;
  }
};

// Utilities
const fmtSize = (kb) => kb >= 1024 ? (kb / 1024).toFixed(1) + ' MB' : kb + ' KB';
const fmtDate = (d) => {
  const dt = new Date(d);
  const diff = Math.floor((Date.now() - dt) / 86400000);
  if (diff === 0) return 'วันนี้';
  if (diff === 1) return 'เมื่อวาน';
  if (diff < 7) return `${diff} วันก่อน`;
  if (diff < 30) return `${Math.floor(diff/7)} สัปดาห์ก่อน`;
  if (diff < 365) return `${Math.floor(diff/30)} เดือนก่อน`;
  return `${Math.floor(diff/365)} ปีก่อน`;
};

const ToastCtx = React.createContext(null);

  const [toasts, setToasts] = React.useState([]);
  const push = React.useCallback((msg, kind='ok') => {
    const id = Math.random().toString(36).slice(2);
    setToasts(t => [...t, { id, msg, kind }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2800);
  }, []);
  return (
    <ToastCtx.Provider value={push}>
      {children}
      <div className="toast-wrap">
        {toasts.map(t => (
          <div className={`toast ${t.kind}`} key={t.id}>
            <Icon name={t.kind === 'err' ? 'close' : 'check'} size={16}/>
            {t.msg}
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
};

// Upload modal
const detectType = (filename) => {
  const f = filename.toLowerCase();
  if (/eia|สิ่งแวดล้อม|environment|impact/.test(f)) return 'EIA';
  if (/แบบ|drawing|plan|dwg|blueprint|สถาปัตย์|โครงสร้าง/.test(f)) return 'แบบ';
  if (/สัญญา|contract|agreement/.test(f)) return 'สัญญา';
  if (/แรงงาน|labor|worker|safety|ปลอดภัย/.test(f)) return 'แรงงาน';
  if (/มยผ|มาตรฐาน|standard|spec/.test(f)) return 'มาตรฐาน';
  if (/mom|minutes|รายงานประชุม|meeting|ประชุม/.test(f)) return 'MOM';
  if (/ราคา|boq|ประมาณการ|cost|budget/.test(f)) return 'ราคา';
  return 'อื่นๆ';
};

const detectVersion = (filename) => {
  const m = filename.match(/(rev\s*\d+|v\d+|\d{4}-\d{2}-\d{2})/i);
  return m ? m[0] : null;
};

const UploadModal = ({ open, onClose, projects, onUpload }) => {
  const [drag, setDrag] = React.useState(false);
  const [items, setItems] = React.useState([]);
  const [proj, setProj] = React.useState(projects[0]?.id || '');
  const [type, setType] = React.useState('auto');
  const toast = useToast();

  React.useEffect(() => { if (!open) { setItems([]); setDrag(false); } }, [open]);

  const handleFiles = (files) => {
    const arr = Array.from(files).map(f => ({
      id: Math.random().toString(36).slice(2),
      name: f.name,
      size: Math.round(f.size / 1024),
      type: type === 'auto' ? detectType(f.name) : type,
      version: detectVersion(f.name),
      progress: 0,
    }));
    setItems(prev => [...prev, ...arr]);
    arr.forEach(it => {
      let p = 0;
      const tk = setInterval(() => {
        p += Math.random() * 25 + 10;
        if (p >= 100) { p = 100; clearInterval(tk); }
        setItems(prev => prev.map(x => x.id === it.id ? {...x, progress: p} : x));
      }, 220);
    });
  };

  const onDrop = (e) => {
    e.preventDefault(); setDrag(false);
    handleFiles(e.dataTransfer.files);

            <span><Icon name="building" size={13}/> {project.client}</span>
            <span><Icon name="file" size={13}/> {projFiles.length} ไฟล์</span>
            <span><Icon name="layers" size={13}/> {fmtSize(totalSize)}</span>
          </div>
          <div style={{display: 'flex', gap: 8, marginTop: 14}}>
            <button className="btn btn-sm btn-primary" onClick={() => toast(`ดาวน์โหลด ${project.name} (Zip ทั้งหมด)`)}>
              <Icon name="zip" size={13}/> Zip ทั้งโครงการ
            </button>
            <button className="btn btn-sm" style={{background: 'rgba(255,255,255,0.15)', color: 'white', border: '1px solid rgba(255,255,255,0.2)'}} onClick={() => toast('Zip เฉพาะ Version ล่าสุด')}>
              <Icon name="bolt" size={13}/> Zip เฉพาะล่าสุด
            </button>
          </div>
        </div>

        <div className="drawer-tools">
          <div className="drawer-search">
            <Icon name="search" size={15} style={{color: 'var(--gray-500)'}}/>
            <input placeholder="ค้นหาในเอกสาร..." value={search} onChange={e => setSearch(e.target.value)} />
          </div>
          <button className={`filter-chip ${showLatestOnly ? 'on' : ''}`} onClick={() => setShowLatestOnly(s => !s)} title="แสดง Version ล่าสุดเท่านั้น">
            <Icon name="bolt" size={11}/> ล่าสุด
          </button>
        </div>

        <div className="drawer-tools" style={{borderTop: 0, paddingTop: 0, flexWrap: 'wrap'}}>
          {types.map(t => (
            <button key={t} className={`filter-chip ${filter === t ? 'on' : ''}`} onClick={() => setFilter(t)}>
              {t === 'all' ? 'ทั้งหมด' : t}
            </button>
          ))}
        </div>

        <div className="drawer-body">
          {filteredKeys.length === 0 && (
            <div style={{textAlign: 'center', padding: 40, color: 'var(--gray-500)'}}>
              <Icon name="file" size={28}/>
              <div style={{marginTop: 8}}>ไม่พบเอกสารที่ตรงกับเงื่อนไข</div>
            </div>
          )}
          {filteredKeys.map(k => {
            const grp = groups[k];
            const [type, baseName] = k.split('|');
            const shown = showLatestOnly ? grp.slice(0, 1) : grp;
            return (
              <div className="version-group" key={k}>
                <div className="vg-head">
                  <div style={{display: 'flex', alignItems: 'center', gap: 8}}>
                    <span className={`badge dt-bg-${type}`} style={{padding: '3px 10px'}}>{type}</span>
                    <span style={{fontFamily: 'Prompt'}}>{baseName}</span>
                  </div>
                  <span style={{color: 'var(--gray-500)', fontSize: 12}}>
                    {grp.length} version{grp.length > 1 ? 's' : ''}
                  </span>
                </div>
                <div className="vg-body">
                  {shown.map(f => (
                    <FileRow key={f.id} file={f} onDelete={onDeleteFile}/>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </>
  );
};

// AI Chat
const AIChat = ({ open, onClose, data, onTriggerDownload, onTriggerZip }) => {
  const [msgs, setMsgs] = React.useState([
    { role: 'bot', text: 'สวัสดีครับ ผมเป็น AI Document Agent ผมช่วยค้นหาเอกสาร, ดาวน์โหลดไฟล์, หรือตอบคำถามเกี่ยวกับโครงการของคุณได้ครับ ลองพิมพ์คำสั่งดูเลย' },
  ]);
  const [input, setInput] = React.useState('');
  const [thinking, setThinking] = React.useState(false);
  const endRef = React.useRef(null);

  React.useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs, thinking]);

  const suggestions = ['หา EIA ล่าสุดของ MRT-PP', 'รวม Zip โครงการ ABC', 'มี MOM กี่ฉบับ?'];

  const send = async (textOverride) => {
    const text = (textOverride ?? input).trim();
    if (!text || thinking) return;
    setInput('');
    setMsgs(m => [...m, { role: 'user', text }]);
    setThinking(true);

    const ctx = `รายชื่อโครงการ:\n${data.projects.map(p => `- ${p.code}: ${p.name}`).join('\n')}\n\nไฟล์ล่าสุด:\n${data.files.filter(f => f.isLatest).map(f => `[${f.type}] ${f.name}`).join('\n')}`;
    const prompt = `คุณเป็น TCM Document Agent ตอบเป็นภาษาไทย กระชับ\n\nข้อมูล:\n${ctx}\n\nผู้ใช้ถาม: "${text}"\n\nตอบเป็น JSON: {"intent":"download_single|download_zip|answer","reply":"ตอบกลับสั้น","fileName":"หรือ null","projectCode":"หรือ null"}`;

    let reply = 'ขออภัย ระบบไม่สามารถตอบได้ในขณะนี้';
    let intent = 'answer';
    let fileName = null;
    let projectCode = null;
    try {
      const out = await window.claude.complete(prompt);
      const clean = out.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      reply = parsed.reply || reply;
      intent = parsed.intent || 'answer';
      fileName = parsed.fileName || null;
      projectCode = parsed.projectCode || null;
    } catch (e) {
      console.warn('parse fail', e);
    }

    setThinking(false);
    setMsgs(m => [...m, { role: 'bot', text: reply, intent, fileName, projectCode }]);
  };

  if (!open) return null;

  return (
    <div className="chat-panel">
      <div className="chat-head">
        <div className="ico"><Icon name="sparkles" size={18}/></div>
        <div>
          <div className="ttl">ถามหาเอกสาร</div>
          <div className="sub">Claude Haiku 4.5 · พร้อมตอบเสมอ</div>
        </div>
        <button className="close" onClick={onClose}><Icon name="close" size={18}/></button>
      </div>

      <div className="chat-msgs" ref={endRef}>
        {msgs.map((m, i) => (
          <div className={`msg ${m.role}`} key={i}>
            <div className="bubble">
              {m.text}
              {m.intent === 'download_single' && m.fileName && (
                <div className="file-pill" onClick={() => onTriggerDownload(m.fileName)}>
                  <Icon name="download" size={14} style={{color: 'var(--green)'}}/>
                  <span className="nm">ดาวน์โหลด: {m.fileName}</span>
                </div>
              )}
              {m.intent === 'download_zip' && m.projectCode && (
                <div className="file-pill" onClick={() => onTriggerZip(m.projectCode)}>
                  <Icon name="zip" size={14} style={{color: 'var(--green)'}}/>
                  <span className="nm">ดาวน์โหลด Zip: {m.projectCode}</span>
                </div>
              )}
            </div>
          </div>
        ))}
        {thinking && (
          <div className="msg bot">
            <div className="bubble">
              <div className="typing"><span></span><span></span><span></span></div>
            </div>
          </div>
        )}
        {msgs.length === 1 && !thinking && (
          <div className="chat-suggest">
            {suggestions.map(s => (
              <button key={s} onClick={() => send(s)}>{s}</button>
            ))}
          </div>
        )}
      </div>

      <div className="chat-input">
        <input placeholder="พิมพ์คำถาม เช่น หา BOQ ล่าสุดของ ABC..." value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && send()} />
        <button onClick={() => send()} disabled={thinking || !input.trim()}>
          <Icon name="send" size={16}/>
        </button>
      </div>
    </div>
  );
};

const ChatFab = ({ onClick }) => (
  <button className="chat-fab" onClick={onClick} title="ถามหาเอกสาร">
    <Icon name="sparkles" size={22}/>
  </button>
);

// Main App
const App = () => {
  const [data, setData] = React.useState(() => ({
    projects: window.TCM_DATA.projects,
    files: window.TCM_DATA.files,
  }));
  const [active, setActive] = React.useState('dashboard');
  const [uploadOpen, setUploadOpen] = React.useState(false);
  const [drawerProj, setDrawerProj] = React.useState(null);
  const [chatOpen, setChatOpen] = React.useState(false);
  const toast = useToast();

  const stats = React.useMemo(() => ({
    projects: data.projects.length,
    files: data.files.length,
    types: new Set(data.files.map(f => f.type)).size,
  }), [data]);

  const handleUpload = React.useCallback((items) => {
    setData(d => {
      const newFiles = items.map(it => ({
        id: 'u' + Math.random().toString(36).slice(2,7),
        projectId: it.projectId,
        type: it.type,
        baseName: it.name.replace(/\.\w+$/, '').replace(/_(rev\s*\d+|v\d+|\d{4}-\d{2}-\d{2})$/i, ''),
        name: it.name,
        rev: it.version,
        date: new Date().toISOString().slice(0,10),
        ext: (it.name.split('.').pop() || 'pdf').toLowerCase(),
        size: it.size,
        uploader: 'นภัสวรรณ',
        isLatest: false,
      }));
      const allFiles = [...d.files, ...newFiles];
      const groups = {};
      allFiles.forEach(f => {
        const k = `${f.projectId}|${f.type}|${f.baseName}`;
        if (!groups[k]) groups[k] = [];
        groups[k].push(f);
      });
      Object.values(groups).forEach(g => {
        g.sort((a,b) => new Date(b.date) - new Date(a.date));
        g.forEach((f, i) => { f.isLatest = i === 0; });
      });
      return { ...d, files: allFiles };
    });
  }, []);

  const handleDeleteFile = React.useCallback((id) => {
    setData(d => ({ ...d, files: d.files.filter(f => f.id !== id) }));
  }, []);

  const handleAIDownload = React.useCallback((fileName) => {
    toast(`เริ่มดาวน์โหลด: ${fileName}`);
  }, [toast]);

  const handleAIZip = React.useCallback((projectCode) => {
    toast(`สร้าง Zip โครงการ ${projectCode}...`);
  }, [toast]);

  const currentProject = drawerProj ? data.projects.find(p => p.id === drawerProj) : null;

  return (
    <div className="app">
      <Topbar active={active} onNav={(v) => { setActive(v); if (v === 'ai') setChatOpen(true); }} onOpenUpload={() => setUploadOpen(true)} />
      <Hero onUpload={() => setUploadOpen(true)} onAsk={() => setChatOpen(true)} stats={stats} />
      <Dashboard data={data} onOpenProject={setDrawerProj} onOpenUpload={() => setUploadOpen(true)} />
      <footer className="footer">
        <div className="container">
          <div>TCM Document Agent · v5 Engineering Edition · Powered by Claude Haiku 4.5</div>
          <div style={{fontSize: 12, marginTop: 4, color: 'var(--gray-400)'}}>
            © 2026 TCM · Phase 2: เชื่อม OneDrive (กำลังพัฒนา)
          </div>
        </div>
      </footer>

      <UploadModal open={uploadOpen} onClose={() => setUploadOpen(false)} projects={data.projects} onUpload={handleUpload} />
      {currentProject && (
        <ProjectDrawer project={currentProject} files={data.files} onClose={() => setDrawerProj(null)} onDeleteFile={handleDeleteFile} />
      )}
      {!chatOpen && <ChatFab onClick={() => setChatOpen(true)}/>}
      <AIChat open={chatOpen} onClose={() => setChatOpen(false)} data={data} onTriggerDownload={handleAIDownload} onTriggerZip={handleAIZip} />
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ToastProvider><App/></ToastProvider>);
</script>
</body>
</html>
